# ==========================================================
# logging設定ファイル（conf形式）
# RotatingFileHandler / TimedRotatingFileHandler 使用版
# ==========================================================
# この設定は「ログファイルを自動で分割する」構成です。
#
# ・サイズで分割 → RotatingFileHandler
# ・時間で分割   → TimedRotatingFileHandler
#
# logging.config.fileConfig() で読み込みます。
# ==========================================================


# ==========================================================
# ■ 1. 使用するLoggerの一覧
# ==========================================================
# root           → 基本ロガー
# sampleLogger   → 追加ロガー

[loggers]
keys=root,sampleLogger


# ==========================================================
# ■ 2. 使用するHandlerの一覧
# ==========================================================
# rotatinghandler       → サイズで分割
# timedrotatinghandler  → 時間で分割

[handlers]
keys=rotatinghandler,timedrotatinghandler


# ==========================================================
# ■ 3. 使用するFormatterの一覧
# ==========================================================

[formatters]
keys=sampleFormatter


# ==========================================================
# ■ 4. rootロガー設定
# ==========================================================

[logger_root]

# DEBUG以上を処理対象にする
level=DEBUG

# 使用するHandler（※上で定義した名前と一致させる）
handlers=rotatinghandler,timedrotatinghandler


# ==========================================================
# ■ 追加ロガー sampleLogger の設定
# ==========================================================

[logger_sampleLogger]

# INFO以上のみ処理
level=INFO

# 出力先
handlers=rotatinghandler,timedrotatinghandler

# logging.getLogger("sampleLogger") と一致させる
qualname=sampleLogger

# rootへログを渡さない（重複防止）
propagate=0


# ==========================================================
# ■ 5. サイズで分割するHandler
# ==========================================================
# ファイルサイズが一定を超えたら分割されます。

[handler_rotatinghandler]

# logging.handlers.RotatingFileHandler を使用
class=handlers.RotatingFileHandler

# INFO以上のみ出力
level=INFO

formatter=sampleFormatter

# args の意味（順番重要）:
# 1. ファイル名
# 2. モード（'a' = 追記）
# 3. maxBytes（最大サイズ）
# 4. backupCount（保存世代数）
# 5. encoding（文字コード）

args=('logs/rotating.log', 'a', 1000, 5, 'utf-8')


# ==========================================================
# ■ 6. 時間で分割するHandler
# ==========================================================
# 一定時間ごとにログファイルが分割されます。

[handler_timedrotatinghandler]

# logging.handlers.TimedRotatingFileHandler を使用
class=handlers.TimedRotatingFileHandler

# INFO以上のみ出力
level=INFO

formatter=sampleFormatter

# args の意味（順番重要）:
# 1. ファイル名
# 2. when（単位）
#      's' = 秒
#      'm' = 分
#      'h' = 時
#      'd' = 日
# 3. interval（間隔）
# 4. backupCount（保存世代数）
# 5. encoding（文字コード）

args=('logs/timed_rotating.log', 's', 5, 6, 'utf-8')


# ==========================================================
# ■ 7. フォーマット設定
# ==========================================================

[formatter_sampleFormatter]

# %(asctime)s   → 時刻
# %(name)s      → ロガー名
# %(levelname)s → レベル
# %(message)s   → メッセージ

format=%(asctime)s - %(name)s - %(levelname)s - %(message)s