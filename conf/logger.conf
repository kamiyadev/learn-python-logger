# ==========================================================
# 🟢 logging設定ファイル（conf形式）
# ==========================================================
# このファイルは「ログの出し方」を決める設定ファイルです。
# Pythonコードに細かく書かなくても、
# ここを書き換えるだけでログの動きを変えられます。
# ==========================================================


# ==========================================================
# ■ 1. 使用するLogger（ロガー）の一覧
# ==========================================================
# Logger（ロガー）とは「ログを出す人」のことです。
#
# root           → すべての基本となるロガー
# sampleLogger   → 自分で作った追加ロガー
#
# keysに書いた名前は、必ず後で
# [logger_名前] というセクションを作る必要があります。

[loggers]
keys=root,sampleLogger


# ==========================================================
# ■ 2. 使用するHandler（出力方法）の一覧
# ==========================================================
# Handler（ハンドラー）とは「ログの出力先」です。
#
# consoleHandler → ターミナル（画面）に表示
# fileHandler    → ファイルに保存

[handlers]
keys=consoleHandler, fileHandler


# ==========================================================
# ■ 3. 使用するFormatter（表示形式）の一覧
# ==========================================================
# Formatter（フォーマッター）は「ログの見た目」を決めます。
# 例：
# 2026-02-23 10:00:00 - sampleLogger - INFO - メッセージ

[formatters]
keys=sampleFormatter


# ==========================================================
# ■ 4. ルートロガー（root）の設定
# ==========================================================
# rootはすべての基本です。
# 特別なロガーを指定しない場合は、rootが使われます。

[logger_root]

# ログレベルを設定します。
# DEBUGが一番細かいログです。
# DEBUG < INFO < WARNING < ERROR < CRITICAL
level=DEBUG

# どこに出力するか（handlerの名前を書く）
handlers=consoleHandler, fileHandler


# ==========================================================
# ■ 追加ロガー sampleLogger の設定
# ==========================================================
# logging.getLogger("sampleLogger") と書いたときに使われます。

[logger_sampleLogger]

# INFO以上のみ出力します。
# DEBUGは出ません。
level=INFO

# 出力先（画面とファイル両方）
handlers=consoleHandler, fileHandler

# ロガー名（getLoggerの引数と同じにする）
qualname=sampleLogger

# 0 = rootにログを渡さない
# 1 = rootにも渡す（重複する可能性あり）
propagate=0


# ==========================================================
# ■ 5. コンソール出力の設定
# ==========================================================
# ターミナルに表示するための設定です。

[handler_consoleHandler]

# 画面に出力するためのクラス
class=StreamHandler

# INFO以上のみ表示
# ここでさらにフィルタがかかります。
level=INFO

# 使用する表示形式
formatter=sampleFormatter

# sys.stdout = 通常の画面出力
args=(sys.stdout,)


# ==========================================================
# ■ 6. ファイル出力の設定
# ==========================================================
# ログをファイルに保存する設定です。

[handler_fileHandler]

# ファイルに出力するクラス
class=FileHandler

# ERROR以上だけ保存
# INFOやWARNINGは保存されません
level=ERROR

# 使用する表示形式
formatter=sampleFormatter

# 引数の意味：
# 'logs/python.log' → 保存するファイル
# 'a'               → 追記モード（上書きしない）
# 'utf-8'           → 文字コード
#
# ※ logsフォルダが無いとエラーになります
args=('logs/python.log', 'a', 'utf-8')


# ==========================================================
# ■ 7. ログの表示フォーマット設定
# ==========================================================
# 実際のログの見た目を決めます。

[formatter_sampleFormatter]

# 各項目の意味：
# %(asctime)s   → ログ出力時間
# %(name)s      → ロガー名
# %(levelname)s → ログレベル
# %(message)s   → メッセージ本文
#
# 表示例：
# 2026-02-23 10:00:00,123 - sampleLogger - INFO - Hello

format=%(asctime)s - %(name)s - %(levelname)s - %(message)s