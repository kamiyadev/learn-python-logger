# ==========================================================
# logging YAML設定ファイル（dictConfig用）
# ==========================================================
# このファイルは logging.config.dictConfig() で読み込む設定です。
# Pythonコード側に細かく書かなくても、
# このファイルを書き換えることでログの動きを変更できます。
# ==========================================================


# ==========================================================
# ■ 設定のバージョン
# ==========================================================
# dictConfigでは version: 1 を指定します。
version: 1


# ==========================================================
# ■ Formatter（ログの見た目）設定
# ==========================================================
# ログをどのような形式で表示するかを決めます。
# simple という名前のフォーマッターを定義しています。

formatters:
  simple:

    # 各項目の意味
    # %(asctime)s   → ログ出力時刻
    # %(name)s      → ロガー名
    # %(levelname)s → ログレベル
    # %(message)s   → メッセージ本文
    #
    # 表示例：
    # 2026-02-23 10:00:00 - sampleLogger - INFO - Hello
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'


# ==========================================================
# ■ Handler（ログの出力先）設定
# ==========================================================
# Handlerは「ログをどこに出すか」を決めます。
# 今回は2つ定義しています：
# ・console_handler → 画面表示
# ・file_handler    → ファイル保存

handlers:

  # ------------------------------
  # 画面（コンソール）出力
  # ------------------------------
  console_handler:

    # 画面に出力するためのクラス
    class: logging.StreamHandler

    # WARNING以上のみ表示
    # DEBUG < INFO < WARNING < ERROR < CRITICAL
    level: WARNING

    # 使用するフォーマッター名
    formatter: simple

    # 標準出力（通常の画面）
    stream: ext://sys.stdout


  # ------------------------------
  # ファイル出力
  # ------------------------------
  file_handler:

    # ファイルに保存するクラス
    class: logging.FileHandler

    # INFO以上を保存
    level: INFO

    # 使用するフォーマッター名
    formatter: simple

    # 保存先ファイル
    # logsフォルダが存在しないとエラーになります
    filename: logs/python_yaml.log


# ==========================================================
# ■ Logger（ログを出す人）設定
# ==========================================================
# sampleLogger という名前のロガーを定義しています。
#
# Pythonコードで
# logging.getLogger("sampleLogger")
# と書いたときにこの設定が使われます。

loggers:
  sampleLogger:

    # DEBUG以上を処理対象にします
    # ただしHandler側のレベルも影響します
    level: DEBUG

    # 使用するHandler（出力先）
    handlers: [console_handler, file_handler]

    # no にすると root にログを渡しません
    # yes にすると root にも渡され、重複する可能性があります
    propagate: no


# ==========================================================
# ■ rootロガーの設定
# ==========================================================
# 特別なロガー名を指定しない場合、
# rootロガーが使われます。

root:

  # WARNING以上のみ処理
  level: WARNING

  # 出力先
  handlers: [console_handler, file_handler]